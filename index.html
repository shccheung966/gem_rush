<!DOCTYPE html>
<html>
<head>
    <title>Collect the Gems!</title>
    <meta name="viewport" content="width=854, user-scalable=no">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
    body {
        font-family: "Press Start 2P", sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden; /* 防止手機頁面晃動 */
        background-color: black;
    }
    #game-container {
        position: relative;
        width: 854px;
        height: 480px;
        margin: 0 auto;
    }
    canvas, #counter, #game-start, #game-over, #controls {
        position: absolute;
        top: 0px;
        left: 0px;
    }
    canvas, #game-start, #game-over {
        border: 1px solid gray;
        width: 854px;
        height: 480px;
    }
    canvas {
        background: url(background.png);
        background-size: cover;
    }
    #game-start, #game-over {
        background: rgba(1, 1, 1, 0.8);
        z-index: 100;
    }
    #counter text {
        font-size: 130%;
        fill: white;
        stroke: black;
        stroke-width: 1px;
    }
    #game-start text {
        font-size: 150%;
        fill: white;
        text-anchor: middle;
    }
    #game-start #game-title {
        font-size: 400%;
        fill: url(#title-fill);
        stroke: black;
    }
    #game-over text {
        font-size: 120%;
        fill: url(#game-over-fill);
        text-anchor: middle;
    }

    /* --- 新增：觸控控制項樣式 --- */
    #controls {
        width: 854px;
        height: 480px;
        pointer-events: none; /* 讓中間區域可以穿透點擊 */
        z-index: 50;
    }
    .touch-area {
        position: absolute;
        bottom: 20px;
        pointer-events: auto;
    }
    #d-pad {
        left: 30px;
        display: grid;
        grid-template-columns: repeat(3, 70px);
        grid-template-rows: repeat(2, 70px);
        gap: 10px;
    }
    #action-btn {
        right: 30px;
        bottom: 40px;
    }
    .control-btn {
        width: 70px;
        height: 70px;
        background: rgba(255, 255, 255, 0.2);
        border: 3px solid rgba(255, 255, 255, 0.5);
        border-radius: 15px;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        user-select: none;
        -webkit-tap-highlight-color: transparent; /* 移除手機點擊藍框 */
        touch-action: manipulation;
    }
    .control-btn:active {
        background: rgba(255, 255, 255, 0.5);
    }
    #btn-up    { grid-column: 2; }
    #btn-left  { grid-column: 1; grid-row: 2; }
    #btn-down  { grid-column: 2; grid-row: 2; }
    #btn-right { grid-column: 3; grid-row: 2; }
    #btn-speed {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255, 69, 0, 0.4);
        font-size: 14px;
    }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas width="854px" height="480px"></canvas>

        <!-- 虛擬按鈕 -->
        <div id="controls" style="display: none;">
            <div id="d-pad" class="touch-area">
                <div class="control-btn" id="btn-up">↑</div>
                <div class="control-btn" id="btn-left">←</div>
                <div class="control-btn" id="btn-down">↓</div>
                <div class="control-btn" id="btn-right">→</div>
            </div>
            <div id="action-btn" class="touch-area">
                <div class="control-btn" id="btn-speed">SPEED</div>
            </div>
        </div>

        <svg xmlns="http://w3.org" id="counter">
            <text x="10" y="35">
                TIME:<tspan id="time-remaining">20</tspan>
            </text>
        </svg>

        <svg xmlns="http://w3.org" id="game-start">
            <defs>
                <linearGradient id="title-fill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0.2" stop-color="red" />
                    <stop offset="0.4" stop-color="yellow" />
                    <stop offset="0.6" stop-color="green" />
                    <stop offset="0.8" stop-color="purple" />
                </linearGradient>
            </defs>
            <text id="game-title" x="50%" y="45%">GEM RUSH!</text>
            <text x="50%" y="60%">Tap here to start</text>
        </svg>

        <svg xmlns="http://w3.org" id="game-over" style="display: none">
            <defs>
                <linearGradient id="game-over-fill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="red" />
                    <stop offset="0.5" stop-color="yellow" />
                    <stop offset="1" stop-color="red" />
                </linearGradient>
            </defs>
            <text x="50%" y="50%">
                Time's up! You have collected
                <tspan id="final-gems">0</tspan>
                gem(s).
            </text>
        </svg>
    </div>

    <script src="https://jquery.com"></script>
    <script src="bounding_box.js"></script>
    <script src="sprite.js"></script>
    <script src="player.js"></script>
    <script src="gem.js"></script>
    <script src="fire.js"></script>
    <script>
$(document).ready(function() {
    /* --- 1. 原有的初始化 --- */
    const cv = $("canvas").get(0);
    const context = cv.getContext("2d");

    const sounds = {
        background: new Audio("background.mp3"),
        collect: new Audio("collect.mp3"),
        gameover: new Audio("gameover.mp3")
    };

    const totalGameTime = 20;
    const gemMaxAge = 3000;
    let gameStartTime = 0;
    let collectedGems = 0;
    let isGameRunning = false; // 新增：判斷遊戲是否正在進行

    const gameArea = BoundingBox(context, 165, 60, 420, 800);
    const player = Player(context, 427, 240, gameArea);
    const gem = Gem(context, 427, 350, "green");
    const fires = [
        Fire(context, 60, 165),
        Fire(context, 800, 165),
        Fire(context, 60, 420),
        Fire(context, 800, 420)
    ];

    /* --- 2. 觸控處理函數 (修正點：加入 mousedown 支援 & 確保全域可用) --- */
    function bindInput(id, actionId) {
        const el = document.getElementById(id);
        if (!el) return;

        // 啟動動作 (觸控 或 滑鼠按下)
        const startAction = (e) => {
            e.preventDefault();
            if (!isGameRunning) return;
            if (actionId === "speed") player.speedUp();
            else player.move(actionId);
        };

        // 停止動作 (觸控結束 或 滑鼠放開)
        const stopAction = (e) => {
            e.preventDefault();
            if (actionId === "speed") player.slowDown();
            else player.stop(actionId);
        };

        el.addEventListener("touchstart", startAction, { passive: false });
        el.addEventListener("touchend", stopAction, { passive: false });
        el.addEventListener("mousedown", startAction);
        el.addEventListener("mouseup", stopAction);
        el.addEventListener("mouseleave", stopAction); // 滑鼠移出按鈕也要停止
    }

    // 立即綁定，不等待 Click
    bindInput("btn-left", 1);
    bindInput("btn-up", 2);
    bindInput("btn-right", 3);
    bindInput("btn-down", 4);
    bindInput("btn-speed", "speed");

    /* --- 3. 遊戲主迴圈 --- */
    function doFrame(now) {
        if (!isGameRunning) return;
        if (gameStartTime == 0) gameStartTime = now;

        const gameTimeSoFar = now - gameStartTime;
        const timeRemaining = Math.ceil((totalGameTime * 1000 - gameTimeSoFar) / 1000);
        $("#time-remaining").text(timeRemaining);

        if (timeRemaining <= 0) {
            isGameRunning = false;
            sounds.background.pause();
            $("#final-gems").text(collectedGems);
            $("#game-over").show();
            $("#controls").hide();
            sounds.gameover.play();
            return;
        }

        gem.update(now);
        player.update(now);
        for (let i=0; i<4; i++) fires[i].update(now);
        if (gem.getAge(now) > gemMaxAge) gem.randomize(gameArea);

        const {x, y} = gem.getXY();
        const box = player.getBoundingBox();
        if (box.isPointInBox(x, y)) {
            sounds.collect.play();
            collectedGems++;
            gem.randomize(gameArea);
            sounds.collect.currentTime = 0;
        }

        context.clearRect(0, 0, cv.width, cv.height);
        gem.draw();
        player.draw();
        for (let i=0; i<4; i++) fires[i].draw();
        
        requestAnimationFrame(doFrame);
    }

    /* --- 4. 開始遊戲按鈕 --- */
    $("#game-start").on("click touchstart", function(e) {
        e.preventDefault();
        isGameRunning = true;
        $("#game-start").hide();
        $("#controls").show();
        
        gem.randomize(gameArea);
        sounds.background.play();
        requestAnimationFrame(doFrame);
    });
});
    </script>
</body>
</html>
