<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Gem Rush</title>
    <style>
        .touch-button {
            width: 80px;
            height: 80px;
            background-color: #4CAF50;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            margin: 10px;
            touch-action: manipulation;
            cursor: pointer;
        }
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="button-container">
        <button class="touch-button" id="btnUp">⬆️</button>
        <button class="touch-button" id="btnDown">⬇️</button>
    </div>
    <div class="button-container">
        <button class="touch-button" id="btnLeft">⬅️</button>
        <button class="touch-button" id="btnRight">➡️</button>
    </div>
    <div class="button-container">
        <button class="touch-button" id="btnSpace">Space</button>
    </div>
    <script>
        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnSpace = document.getElementById('btnSpace');

        function move(direction) {
            // Implement the move functionality.
        }

        function stop() {
            // Implement the stop functionality.
        }

        function speedUp() {
            // Implement speed up functionality.
        }

        function slowDown() {
            // Implement slow down functionality.
        }

        const handleTouchAndClick = (func) => {
            btnUp.addEventListener('click', func);
            btnUp.addEventListener('touchstart', func);
            btnDown.addEventListener('click', func);
            btnDown.addEventListener('touchstart', func);
            btnLeft.addEventListener('click', func);
            btnLeft.addEventListener('touchstart', func);
            btnRight.addEventListener('click', func);
            btnRight.addEventListener('touchstart', func);
            btnSpace.addEventListener('click', func);
            btnSpace.addEventListener('touchstart', func);
        };

        // Assign proper movements to buttons
        handleTouchAndClick(e => {
            const id = e.currentTarget.id;
            if (id === 'btnUp') move('up');
            if (id === 'btnDown') move('down');
            if (id === 'btnLeft') move('left');
            if (id === 'btnRight') move('right');
            if (id === 'btnSpace') speedUp(); // Example for space
        });

    </script>
</body>
</html>
